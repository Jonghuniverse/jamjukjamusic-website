<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DISCOGRAPHY - 잠은 죽어서 자</title>
  <link rel="icon" href="../logo_images/logosolo.png" type="image/png">
  <link rel="shortcut icon" href="../logo_images/logosolo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* --- 애니메이션 정의 --- */
    @keyframes dropDown {
      0% { opacity: 0; transform: translateY(-30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* --- 공통 스타일 --- */
    body {
      margin: 0;
      background-color: #fef6e4;
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* --- 헤더 (PC 버전) --- */
    header {
      background-color: #fff066;
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center;
      padding: 1rem 4rem; 
      position: sticky;
      top: 0;
      z-index: 1000; 
      height: 135px; 
      box-sizing: border-box;
    }

    .header-left {
      grid-column: 1;
      display: flex;
      align-items: center;
      padding-left: 3rem; 
    }

    .logo { height: 70px; width: auto; }

    .nav-pc {
      grid-column: 2;
      display: flex;
      gap: 3rem;
      align-items: center;
      justify-content: center;
    }

    .nav-pc a {
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .icons {
      grid-column: 3;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      justify-content: flex-end;
    }

    .icons img { height: 35px; width: auto; transition: transform 0.2s; }
    .icons img[alt="SoundCloud"] { height: 28px; }
    .icons img:hover { transform: scale(1.1); }

    .menu-toggle, .nav-mobile { display: none; }

    /* --- 메인 콘텐츠 영역 --- */
    .main-container {
      flex: 1;
      display: flex;
      justify-content: center;
      width: 100%;
      padding: 5rem 0;
    }

    .discography-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80%;
      max-width: 1200px;
    }

    /* 타이틀 스타일 */
    .page-title {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -0.1rem;
      margin: 0 0 4rem 0;
      color: #000;
      opacity: 0;
      animation: dropDown 1s ease-out forwards;
      text-transform: uppercase;
    }

    /* 앨범 그리드 레이아웃 (PC: 4열) */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4개씩 배치 */
      gap: 2.5rem;
      width: 100%;
    }

    /* 앨범 아이템 */
    .album-item {
      opacity: 0;
      animation: dropDown 1s ease-out forwards;
      animation-delay: 0.3s;
    }

    /* 링크 스타일 (밑줄 제거) */
    .album-link {
      text-decoration: none; /* 밑줄 표시 안 나오게 설정 */
      color: inherit;
      display: block;
      transition: transform 0.3s ease;
    }

    .album-link:hover {
      transform: translateY(-10px);
    }

    /* 앨범 커버 이미지 */
    .album-cover {
      width: 100%;
      aspect-ratio: 1 / 1; /* 정사각형 유지 */
      object-fit: cover;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      margin-bottom: 1rem;
      display: block;
    }

    /* 앨범 제목 */
    .album-title {
      font-size: 1rem;
      font-weight: 500;
      text-align: left;
      margin: 0;
      line-height: 1.4;
      word-break: keep-all;
    }

    /* --- 푸터 --- */
    .site-footer {
      background-color: #1a1a2e;
      padding: 40px 0;
      text-align: center;
      width: 100%;
    }

    .footer-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .footer-logo { height: 40px; width: auto; }
    .copyright-text { font-size: 12px; color: #ffffff; margin: 0; line-height: 1.5; }

    /* ========================================= */
    /* --- 모바일 버전 스타일 (768px 이하) --- */
    /* ========================================= */
    @media screen and (max-width: 768px) {
      header { display: flex; justify-content: space-between; padding: 1rem; height: 70px; }
      .header-left { padding-left: 0; }
      .nav-pc { display: none; }
      .menu-toggle { display: block; font-size: 1.5rem; cursor: pointer; color: #000; background: none; border: none; margin-right: 1rem; }
      .logo { height: 45px; }
      .icons { gap: 1rem; }
      .icons img { height: 24px; }
      .icons img[alt="SoundCloud"] { height: 19px; }

      .nav-mobile {
        display: flex; position: fixed; top: 70px; left: -100%; width: 100%; height: calc(100vh - 70px);
        background-color: rgba(255, 240, 102, 0.6); transition: left 0.3s ease-out; z-index: 999;
        flex-direction: column; align-items: center; padding-top: 2rem; gap: 2rem;
      }
      .nav-mobile.active { left: 0; }
      .nav-mobile a { color: #000; text-decoration: none; font-weight: 700; font-size: 1.2rem; }

      /* 모바일 타이틀 */
      .page-title { font-size: 2.5rem; margin-bottom: 3rem; }

      /* 모바일 그리드 (1열로 변경) */
      .album-grid {
        grid-template-columns: 1fr; /* 하나씩 세로로 나옴 */
        gap: 3rem;
      }
      
      .album-item {
        width: 100%;
        max-width: 400px; /* 모바일에서 너무 커지는 것 방지 */
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <button class="menu-toggle" id="mobile-menu-btn">☰</button>
      <div class="logo-container">
        <a href="../"><img src="../logo_images/logoblack.png" alt="로고" class="logo"></a>
      </div>
    </div>
    <nav class="nav-pc">
      <a href="../crew">CREW</a>
      <a href="../discography">DISCOGRAPHY</a>
      <a href="../drumtab">DRUMTAB</a>
    </nav>
    <div class="icons">
      <a href="https://www.instagram.com/jamjukjamusic/" target="_blank"><img src="../logo_images/instalogoblack.png" alt="Instagram"></a>
      <a href="https://www.youtube.com/@jamjukjamusic" target="_blank"><img src="../logo_images/youtubelogoblack.png" alt="Youtube"></a>
      <a href="https://soundcloud.com/jamjukjamusic" target="_blank"><img src="../logo_images/soundcloudlogoblack.png" alt="SoundCloud"></a>
    </div>
  </header>

  <nav class="nav-mobile" id="mobile-nav">
    <a href="../crew">CREW</a>
    <a href="../discography">DISCOGRAPHY</a>
    <a href="../drumtab">DRUMTAB</a>
  </nav>

  <main class="main-container">
    <div class="discography-container">
      <h1 class="page-title">DISCOGRAPHY</h1>

      <div class="album-grid">
        <div class="album-item">
          <a href="jjj001.html" class="album-link"> <img src="huniverseprelude.jpg" alt="[EP] Huniverse: prelude" class="album-cover">
            <p class="album-title">[EP] Huniverse: prelude</p>
          </a>
        </div>

        <div class="album-item" style="animation-delay: 0.5s;">
          <a href="#" class="album-link">
            <img src="logo.png" alt="JAMJUKJA" class="album-cover">
            <p class="album-title">Coming Soon</p>
          </a>
        </div>

        <div class="album-item" style="animation-delay: 0.7s;">
          <a href="#" class="album-link">
            <img src="logo.png" alt="JAMJUKJA" class="album-cover">
            <p class="album-title">Coming Soon</p>
          </a>
        </div>

        <div class="album-item" style="animation-delay: 0.9s;">
          <a href="#" class="album-link">
            <img src="logo.png" alt="JAMJUKJA" class="album-cover">
            <p class="album-title">Coming Soon</p>
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <img src="../logo_images/logowhite.png" alt="로고화이트" class="footer-logo">
      <p class="copyright-text">&copy; 2026 <strong>JAMJUKJA MUSIC</strong>. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const menuBtn = document.getElementById('mobile-menu-btn');
    const mobileNav = document.getElementById('mobile-nav');
    menuBtn.addEventListener('click', () => {
      mobileNav.classList.toggle('active');
      menuBtn.innerText = mobileNav.classList.contains('active') ? '✕' : '☰';
    });
  </script>
</body>
</html>
