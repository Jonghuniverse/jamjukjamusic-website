<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>잠은 죽어서 자</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background-color: #fef6e4;
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
    }

    header {
      background-color: #fff066;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      height: 90px;
    }
    .logo {
      height: 64px;
      margin-left: 100%;
    }
    nav {
      display: flex;
      gap: 2rem;
      align-items: center;
    }
    nav a {
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .icons {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .icons img[alt="Instagram"] {
      width: 33px;
      height: 33px;
    }
    .icons img[alt="SoundCloud"] {
      width: 39px;
      height: 26px;
    }

    .visual-layer {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background-color: #fef6e4;
    }

    .particle {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      object-fit: cover;
      z-index: 1;
    }

    .title-img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      max-width: 600px;
      z-index: 3;
    }

    .balloon {
      position: absolute;
      width: 90px;
      animation: floatUp 8s linear infinite;
      z-index: 2;
    }

    .balloon.red { animation-delay: -5s; }
    .balloon.yellow { animation-delay: -3s; }
    .balloon.green { animation-delay: -1s; }
    .balloon.red2 { animation-delay: -4s; }
    .balloon.yellow2 { animation-delay: -2s; }
    .balloon.green2 { animation-delay: 0s; }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-200px); opacity: 0; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html"><img src="logopng.png" alt="로고" class="logo"></a>
    <nav>
      <a href="about.html">ABOUT</a>
      <a href="crew.html">CREW</a>
      <a href="music.html">MUSIC</a>
      <a href="merch.html">MERCHANDISE</a>
    </nav>
    <div class="icons">
      <a href="https://www.instagram.com/h_u____n_i/" target="_blank">
        <img src="instalogoblack.png" alt="Instagram">
      </a>
      <a href="https://soundcloud.com/jamjukjamusic" target="_blank">
        <img src="soundcloudlogoblack.png" alt="SoundCloud">
      </a>
    </div>
  </header>

  <div class="visual-layer">
    <img src="particle.png" alt="Particle layer" class="particle">

    <img src="redbaloon.png" class="balloon red" style="left: 10%;">
    <img src="yellowbaloon.png" class="balloon yellow" style="left: 30%;">
    <img src="greenbaloon.png" class="balloon green" style="left: 50%;">
    <img src="redbaloon.png" class="balloon red2" style="left: 70%;">
    <img src="yellowbaloon.png" class="balloon yellow2" style="left: 85%;">
    <img src="greenbaloon.png" class="balloon green2" style="left: 20%;">

    <img src="951006.png" alt="951006 메시지" class="title-img">
  </div>
</body>
</html>
