<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>잠은 죽어서 자</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

    body {
      margin: 0;
      background-color: #0e0e0e;
      color: #f1f1f1;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    header img {
      max-width: 160px;
      margin-bottom: 40px;
    }

    h1, h2 {
      font-weight: 700;
      margin-bottom: 20px;
      color: #ffffff;
    }

    p {
      max-width: 600px;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .crew {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .spotlight {
      box-shadow: 0 0 80px rgba(255, 255, 255, 0.08);
      background-color: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="잠은 죽어서 자 로고">
  </header>

  <section class="spotlight">
    <h1>잠은 죽어서 자</h1>
    <p>하고 싶은 것 많은 사람들이 모였습니다. 이 우주엔 재밌는 게 너무 많아요. 잘 시간이 없어요.</p>
    <h2>우리의 방식</h2>
    <p>음악도 인생도 우리만의 방식대로</p>

    <h2>크루</h2>
    <div class="crew">
      <div>Jonghun Park</div>
      <div>Jihyeon Kim</div>
    </div>
  </section>
</body>
</html>
