<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>극동아시아타이거즈 - 흔들리는 시간 속에 (Drum Tab) - 잠은 죽어서 자</title>
  <link rel="icon" href="../favicon.ico" type="image/png">
  <link rel="shortcut icon" href="../favicon.ico" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* --- 애니메이션 정의 --- */
    @keyframes dropDown {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* --- 공통 스타일 --- */
    body {
      margin: 0;
      background-color: #fef6e4;
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* --- 헤더 (통합 스타일 유지) --- */
    header {
      background-color: #fff066;
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center;
      padding: 1rem 4rem; 
      position: sticky;
      top: 0;
      z-index: 1000; 
      height: 135px; 
      box-sizing: border-box;
    }
    .header-left { grid-column: 1; display: flex; align-items: center; padding-left: 3rem; }
    .logo { height: 70px; width: auto; }
    .nav-pc { grid-column: 2; display: flex; gap: 3rem; align-items: center; justify-content: center; }
    .nav-pc a { color: #000; text-decoration: none; font-weight: 700; font-size: 1.1rem; }
    .icons { grid-column: 3; display: flex; gap: 1.5rem; align-items: center; justify-content: flex-end; }
    .icons img { height: 35px; width: auto; transition: transform 0.2s; }
    .icons img[alt="SoundCloud"] { height: 28px; }
    .icons img:hover { transform: scale(1.1); }
    .menu-toggle, .nav-mobile { display: none; }

    /* --- 메인 콘텐츠 영역 --- */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 5rem 0;
    }

    .post-title {
      font-size: 2.5rem;
      font-weight: 900;
      color: #000;
      margin-bottom: 3rem;
      text-align: center;
      opacity: 0;
      animation: dropDown 1s ease-out forwards;
    }

    /* --- 탭 미리보기 카드 스타일 (모바일 최적화) --- */
    .tab-card {
      width: 85%;
      max-width: 600px;
      background-color: #fff;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      border: 1px solid #ddd;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      opacity: 0;
      animation: dropDown 1s ease-out forwards;
      animation-delay: 0.3s;
      text-decoration: none; /* 링크 밑줄 제거 */
      display: block;
      overflow: hidden;
    }

    .tab-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.15);
    }

    /* 악보 미리보기 이미지 */
    .tab-preview-img {
      width: 100%;
      height: auto;
      display: block;
      border-bottom: 1px solid #eee;
    }

    /* 카드 하단 안내 문구 */
    .tab-info {
      padding: 20px;
      text-align: center;
      background-color: #fafafa;
    }

    .tab-info-text {
      margin: 0;
      color: #000;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .tab-hint {
      margin-top: 5px;
      color: #888;
      font-size: 0.9rem;
    }

    /* --- 푸터 --- */
    .site-footer {
      background-color: #1a1a2e;
      padding: 40px 0;
      text-align: center;
      width: 100%;
    }
    .footer-content { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .footer-logo { height: 40px; width: auto; }
    .copyright-text { font-size: 12px; color: #ffffff; margin: 0; line-height: 1.5; }

    /* --- 모바일 버전 조절 --- */
    @media screen and (max-width: 768px) {
      header { display: flex; justify-content: space-between; padding: 1rem; height: 70px; }
      .header-left { padding-left: 0; }
      .nav-pc { display: none; }
      .menu-toggle { display: block; font-size: 1.5rem; cursor: pointer; color: #000; background: none; border: none; margin-right: 1rem; }
      .logo { height: 45px; }
      .icons { gap: 1rem; }
      .icons img { height: 24px; }
      .icons img[alt="SoundCloud"] { height: 19px; }

      .nav-mobile {
        display: flex; position: fixed; top: 70px; left: -100%; width: 100%; height: calc(100vh - 70px);
        background-color: rgba(255, 240, 102, 0.6); transition: left 0.3s ease-out; z-index: 999;
        flex-direction: column; align-items: center; padding-top: 2rem; gap: 2rem;
      }
      .nav-mobile.active { left: 0; }
      .nav-mobile a { color: #000; text-decoration: none; font-weight: 700; font-size: 1.2rem; }

      .post-title { font-size: 1.8rem; padding: 0 1rem; }
      .tab-card { width: 90%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <button class="menu-toggle" id="mobile-menu-btn">☰</button>
      <div class="logo-container">
        <a href="../"><img src="../logo_images/logoblack.png" alt="로고" class="logo"></a>
      </div>
    </div>
    <nav class="nav-pc">
      <a href="../crew">CREW</a>
      <a href="../discography">DISCOGRAPHY</a>
      <a href="../drumtab">DRUMTAB</a>
      <a href="../basstab">BASSTAB</a>
    </nav>
    <div class="icons">
      <a href="https://www.instagram.com/jamjukjamusic/" target="_blank"><img src="../logo_images/instalogoblack.png" alt="Instagram"></a>
      <a href="https://www.youtube.com/@jamjukjamusic" target="_blank"><img src="../logo_images/youtubelogoblack.png" alt="Youtube"></a>
      <a href="https://soundcloud.com/jamjukjamusic" target="_blank"><img src="../logo_images/soundcloudlogoblack.png" alt="SoundCloud"></a>
    </div>
  </header>

  <nav class="nav-mobile" id="mobile-nav">
    <a href="../crew">CREW</a>
    <a href="../discography">DISCOGRAPHY</a>
    <a href="../drumtab">DRUMTAB</a>
    <a href="../basstab">BASSTAB</a>
  </nav>

  <main class="main-container">
    <h1 class="post-title">극동아시아타이거즈 - 흔들리는 시간 속에</h1>

    <a href="극동아시아타이거즈 - 흔들리는 시간 속에.pdf" target="_blank" class="tab-card">
      <img src="극동아시아타이거즈 - 흔들리는 시간 속에_preview.png" alt="극동아시아타이거즈 - 흔들리는 시간 속에 악보 미리보기" class="tab-preview-img">
      <div class="tab-info">
        <p class="tab-info-text">전체 악보 보기 (PDF)</p>
        <p class="tab-hint">클릭 시 악보 PDF 다운로드가 가능합니다.</p>
      </div>
    </a>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <img src="../logo_images/logowhite.png" alt="로고화이트" class="footer-logo">
      <p class="copyright-text">&copy; 2026 <strong>JAMJUKJA MUSIC</strong>. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const menuBtn = document.getElementById('mobile-menu-btn');
    const mobileNav = document.getElementById('mobile-nav');
    menuBtn.addEventListener('click', () => {
      mobileNav.classList.toggle('active');
      menuBtn.innerText = mobileNav.classList.contains('active') ? '✕' : '☰';
    });
  </script>
</body>
</html>
