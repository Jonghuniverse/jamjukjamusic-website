<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DRUMTAB - 잠은 죽어서 자</title>
  <link rel="icon" href="../logo_images/logosolo.png" type="image/png">
  <link rel="shortcut icon" href="../logo_images/logosolo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* --- 애니메이션 정의 --- */
    @keyframes dropDown {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* --- 공통 스타일 --- */
    body {
      margin: 0;
      background-color: #fef6e4; /* 기존 페이지와 통일 */
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* --- 헤더 (PC 버전) --- */
    header {
      background-color: #fff066;
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center;
      padding: 1rem 4rem; 
      position: sticky;
      top: 0;
      z-index: 1000; 
      height: 135px; 
      box-sizing: border-box;
    }
    .header-left { grid-column: 1; display: flex; align-items: center; padding-left: 3rem; }
    .logo { height: 70px; width: auto; }
    .nav-pc { grid-column: 2; display: flex; gap: 3rem; align-items: center; justify-content: center; }
    .nav-pc a { color: #000; text-decoration: none; font-weight: 700; font-size: 1.1rem; }
    .icons { grid-column: 3; display: flex; gap: 1.5rem; align-items: center; justify-content: flex-end; }
    .icons img { height: 35px; width: auto; transition: transform 0.2s; }
    .icons img[alt="SoundCloud"] { height: 28px; } /* 요청하신 축소 비율 유지 */
    .icons img:hover { transform: scale(1.1); }
    .menu-toggle, .nav-mobile { display: none; }

    /* --- 메인 콘텐츠 (게시판 영역) --- */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 5rem 0;
    }

    /* 게시판 전용 타이틀 */
    .page-title {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -0.1rem;
      margin: 0 0 4rem 0;
      color: #000;
      opacity: 0;
      animation: dropDown 1s ease-out forwards;
      text-transform: uppercase;
    }

    .board-container {
      width: 80%;
      max-width: 900px;
      opacity: 0;
      animation: dropDown 1s ease-out forwards;
      animation-delay: 0.3s;
    }

    .board-table {
      width: 100%;
      border-collapse: collapse;
      border-top: 3px solid #000; /* 조금 더 굵게 강조 */
    }
    .board-table th, .board-table td {
      padding: 18px 15px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    .th-title { width: 80%; font-weight: 700; }
    .th-date { width: 20%; text-align: center; font-weight: 700; }
    .td-date { text-align: center; color: #666; font-size: 0.9rem; }
    .td-title a { text-decoration: none; color: #000; font-weight: 500; transition: color 0.2s; }
    .td-title a:hover { color: #ff4400; text-decoration: underline; }

    /* 검색창 스타일 */
    .search-bar-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 40px;
    }
    #boardSearch {
      width: 300px;
      padding: 12px 15px;
      border: 2px solid #000;
      background: #fff;
      font-family: inherit;
      outline: none;
    }
    .search-btn {
      padding: 10px 20px;
      background-color: #000;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      transition: background-color 0.2s;
    }
    .search-btn:hover { background-color: #444; }

    /* --- 푸터 --- */
    .site-footer {
      background-color: #1a1a2e;
      padding: 40px 0;
      text-align: center;
      width: 100%;
    }
    .footer-content { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .footer-logo { height: 40px; width: auto; }
    .copyright-text { font-size: 12px; color: #ffffff; margin: 0; line-height: 1.5; }

    /* ========================================= */
    /* --- 모바일 버전 스타일 (768px 이하) --- */
    /* ========================================= */
    @media screen and (max-width: 768px) {
      header { display: flex; justify-content: space-between; padding: 1rem; height: 70px; }
      .header-left { padding-left: 0; }
      .nav-pc { display: none; }
      .menu-toggle { display: block; font-size: 1.5rem; cursor: pointer; color: #000; background: none; border: none; margin-right: 1rem; }
      .logo { height: 45px; }
      .icons { gap: 1rem; }
      .icons img { height: 24px; }
      .icons img[alt="SoundCloud"] { height: 19px; }

      .nav-mobile {
        display: flex; position: fixed; top: 70px; left: -100%; width: 100%; height: calc(100vh - 70px);
        background-color: rgba(255, 240, 102, 0.6); transition: left 0.3s ease-out; z-index: 999;
        flex-direction: column; align-items: center; padding-top: 2rem; gap: 2rem;
      }
      .nav-mobile.active { left: 0; }
      .nav-mobile a { color: #000; text-decoration: none; font-weight: 700; font-size: 1.2rem; }

      .page-title { font-size: 2.5rem; margin-bottom: 3rem; }
      .board-container { width: 90%; }
      #boardSearch { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <button class="menu-toggle" id="mobile-menu-btn">☰</button>
      <div class="logo-container">
        <a href="../"><img src="../logo_images/logoblack.png" alt="로고" class="logo"></a>
      </div>
    </div>
    <nav class="nav-pc">
      <a href="../crew">CREW</a>
      <a href="../discography">DISCOGRAPHY</a>
      <a href="../drumtab">DRUMTAB</a>
    </nav>
    <div class="icons">
      <a href="https://www.instagram.com/jamjukjamusic/" target="_blank"><img src="../logo_images/instalogoblack.png" alt="Instagram"></a>
      <a href="https://www.youtube.com/@jamjukjamusic" target="_blank"><img src="../logo_images/youtubelogoblack.png" alt="Youtube"></a>
      <a href="https://soundcloud.com/jamjukjamusic" target="_blank"><img src="../logo_images/soundcloudlogoblack.png" alt="SoundCloud"></a>
    </div>
  </header>

  <nav class="nav-mobile" id="mobile-nav">
    <a href="../crew">CREW</a>
    <a href="../discography">DISCOGRAPHY</a>
    <a href="../drumtab">DRUMTAB</a>
  </nav>

  <main class="main-container">
    <h1 class="page-title">DRUMTAB</h1>

    <section class="board-container">
      <table class="board-table">
        <thead>
          <tr>
            <th class="th-title">제목</th>
            <th class="th-date">날짜</th>
          </tr>
        </thead>
        <tbody id="boardBody">
          <tr class="board-item">
            <td class="td-title">
              <a>To be uploaded</a>
            </td>
            <td class="td-date">26.xx.xx</td>
          </tr>
          </tbody>
      </table>

      <div class="search-bar-container">
        <input type="text" id="boardSearch" placeholder="검색어를 입력해주세요">
        <button type="button" class="search-btn" onclick="searchBoard()">🔍</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <img src="../logo_images/logowhite.png" alt="로고화이트" class="footer-logo">
      <p class="copyright-text">&copy; 2026 <strong>JAMJUKJA MUSIC</strong>. All rights reserved.</p>
    </div>
  </footer>

  <script>
    /* 모바일 메뉴 토글 스크립트 */
    const menuBtn = document.getElementById('mobile-menu-btn');
    const mobileNav = document.getElementById('mobile-nav');
    menuBtn.addEventListener('click', () => {
      mobileNav.classList.toggle('active');
      menuBtn.innerText = mobileNav.classList.contains('active') ? '✕' : '☰';
    });

    /* 게시판 검색 스크립트 (기존 기능 유지) */
    function searchBoard() {
      let input = document.getElementById('boardSearch').value.toLowerCase();
      let rows = document.querySelectorAll('.board-item');

      rows.forEach(row => {
        let title = row.querySelector('.td-title').innerText.toLowerCase();
        if (title.includes(input)) {
          row.style.display = "";
        } else {
          row.style.display = "none";
        }
      });
    }

    /* 엔터키 검색 지원 */
    document.getElementById('boardSearch').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        searchBoard();
      }
    });
  </script>
</body>
</html>
