<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CREW - 잠은 죽어서 자</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* --- 애니메이션 정의 --- */
    @keyframes dropDown {
      0% {
        opacity: 0;
        transform: translateY(-30px); /* 조금 더 역동적으로 수정 */
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* --- 공통 스타일 --- */
    body {
      margin: 0;
      background-color: #fef6e4;
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* --- 헤더 (PC 버전) --- */
    header {
      background-color: #fff066;
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center;
      padding: 1rem 4rem; 
      position: sticky;
      top: 0;
      z-index: 1000; 
      height: 135px; 
      box-sizing: border-box;
    }

    .header-left {
      grid-column: 1;
      display: flex;
      align-items: center;
      padding-left: 3rem; 
    }

    .logo {
      height: 70px;
      width: auto;
    }

    .nav-pc {
      grid-column: 2;
      display: flex;
      gap: 3rem;
      align-items: center;
      justify-content: center;
    }

    .nav-pc a {
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .icons {
      grid-column: 3;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      justify-content: flex-end;
    }

    .icons img {
      height: 35px;
      width: auto;
      transition: transform 0.2s;
    }

    .icons img[alt="SoundCloud"] {
      height: 28px; 
    }

    .icons img:hover { transform: scale(1.1); }

    .menu-toggle, .nav-mobile {
      display: none;
    }

    /* --- 메인 콘텐츠 영역 --- */
    .main-container {
      flex: 1;
      display: flex;
      align-items: center; 
      justify-content: center;
      width: 100%;
      padding: 5rem 0; /* 위아래 여백을 조금 더 확보 */
    }

    .crew-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 40%; 
      max-width: 600px;
    }

    /* --- CREW 타이틀 스타일 (요청 반영) --- */
    .crew-title {
      font-size: 4rem; /* PC 버전: 크고 웅장하게 */
      font-weight: 900; /* 아주 두껍게 */
      letter-spacing: -0.1rem; /* 글자 간격을 좁혀 힙한 느낌 강조 */
      margin: 0 0 4rem 0; /* 아래 멤버들과의 간격 확보 */
      color: #000;
      opacity: 0;
      animation: dropDown 1s ease-out forwards;
      animation-delay: 0s; /* 가장 먼저 등장 */
      text-transform: uppercase; /* 대문자로 고정 */
    }

    .crew-item {
      display: flex;
      align-items: center;
      gap: 2rem; 
      width: 100%;
      opacity: 0;
      margin-bottom: 2.5rem; /* 멤버 사이 간격 */
      animation: dropDown 1s ease-out forwards;
    }

    /* 애니메이션 딜레이: 타이틀 이후 차례대로 */
    .crew-item:nth-child(2) { animation-delay: 0.3s; }
    .crew-item:nth-child(3) { animation-delay: 0.5s; }
    .crew-item:nth-child(4) { animation-delay: 0.7s; }

    .crew-img {
      width: 120px; 
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }

    .crew-text {
      font-size: 1.3rem; 
      font-weight: 700;
      color: #333;
      margin: 0;
    }

    /* --- 푸터 --- */
    .site-footer {
      background-color: #1a1a2e;
      padding: 40px 0;
      text-align: center;
      width: 100%;
    }

    .footer-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .footer-logo {
      height: 40px;
      width: auto;
    }

    .copyright-text {
      font-size: 12px;
      color: #ffffff;
      margin: 0;
      line-height: 1.5;
    }

    /* ========================================= */
    /* --- 모바일 버전 스타일 (768px 이하) --- */
    /* ========================================= */
    @media screen and (max-width: 768px) {
      header {
        display: flex;
        justify-content: space-between;
        padding: 1rem;
        height: 70px;
      }

      .header-left {
        padding-left: 0;
      }

      .nav-pc {
        display: none;
      }

      .menu-toggle {
        display: block;
        font-size: 1.5rem;
        cursor: pointer;
        color: #000;
        background: none;
        border: none;
        padding: 0;
        margin-right: 1rem;
      }

      .logo {
        height: 45px;
      }

      .icons {
        gap: 1rem;
      }
      .icons img {
        height: 24px;
      }

      .icons img[alt="SoundCloud"] {
        height: 19px; 
      }

      .nav-mobile {
        display: flex;
        position: fixed;
        top: 70px; 
        left: -100%; 
        width: 100%;
        height: calc(100vh - 70px);
        background-color: rgba(255, 240, 102, 0.6); 
        transition: left 0.3s ease-out;
        z-index: 999;
        flex-direction: column;
        align-items: center;
        padding-top: 2rem;
        gap: 2rem;
      }

      .nav-mobile.active {
        left: 0;
      }

      .nav-mobile a {
        color: #000;
        text-decoration: none;
        font-weight: 700;
        font-size: 1.2rem;
      }

      /* 모바일 타이틀 스타일 */
      .crew-title {
        font-size: 2.5rem; /* 모바일: 적절한 크기로 축소 */
        margin-bottom: 3rem;
      }

      .crew-container {
        width: 80%; 
      }
      .crew-img {
        width: 96px; 
        height: 96px;
      }
      .crew-text {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <button class="menu-toggle" id="mobile-menu-btn">☰</button>
      <div class="logo-container">
        <a href="../index.html"><img src="../logo_images/logoblack.png" alt="로고" class="logo"></a>
      </div>
    </div>

    <nav class="nav-pc">
      <a href="../crew/crew.html">CREW</a>
      <a href="../discography/discography.html">DISCOGRAPHY</a>
      <a href="../drumtab/drumtab.html">DRUMTAB</a>
    </nav>

    <div class="icons">
      <a href="https://www.instagram.com/jamjukjamusic/" target="_blank">
        <img src="../logo_images/instalogoblack.png" alt="Instagram">
      </a>
      <a href="https://www.youtube.com/@jamjukjamusic" target="_blank">
        <img src="../logo_images/youtubelogoblack.png" alt="Youtube">
      </a>
      <a href="https://soundcloud.com/jamjukjamusic" target="_blank">
        <img src="../logo_images/soundcloudlogoblack.png" alt="SoundCloud">
      </a>
    </div>
  </header>

  <nav class="nav-mobile" id="mobile-nav">
    <a href="../crew/crew.html">CREW</a>
    <a href="../discography/discography.html">DISCOGRAPHY</a>
    <a href="../drumtab/drumtab.html">DRUMTAB</a>
  </nav>

  <main class="main-container">
    <div class="crew-container">
      <h1 class="crew-title">CREW</h1>

      <div class="crew-item">
        <img src="quokka.png" alt="Quokka" class="crew-img">
        <p class="crew-text">히히 :)</p>
      </div>
      <div class="crew-item">
        <img src="racoon.png" alt="Racoon" class="crew-img">
        <p class="crew-text">아예아</p>
      </div>
      <div class="crew-item">
        <img src="nongdamgom.png" alt="Nongdamgom" class="crew-img">
        <p class="crew-text">어떻게 사람이 농담곰</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <img src="../logo_images/logowhite.png" alt="로고화이트" class="footer-logo">
      <p class="copyright-text">&copy; 2026 <strong>JAMJUKJA MUSIC</strong>. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const menuBtn = document.getElementById('mobile-menu-btn');
    const mobileNav = document.getElementById('mobile-nav');

    menuBtn.addEventListener('click', () => {
      mobileNav.classList.toggle('active');
      menuBtn.innerText = mobileNav.classList.contains('active') ? '✕' : '☰';
    });
  </script>
</body>
</html>
